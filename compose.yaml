services:
  mysql:
    build: ./mysql
    container_name: roundcube-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: roundcubemail
      MYSQL_USER: roundcube
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-roundcube_pass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  roundcube:
    build: ./roundcube
    container_name: roundcube-web
    restart: unless-stopped
    ports:
      - "${ROUNDCUBE_PORT:-8080}:80"
    environment:
      ROUNDCUBEMAIL_DB_TYPE: mysql
      ROUNDCUBEMAIL_DB_HOST: mysql
      ROUNDCUBEMAIL_DB_PORT: 3306
      ROUNDCUBEMAIL_DB_USER: roundcube
      ROUNDCUBEMAIL_DB_PASSWORD: ${MYSQL_PASSWORD:-roundcube_pass}
      ROUNDCUBEMAIL_DB_NAME: roundcubemail
      ROUNDCUBEMAIL_DEFAULT_HOST: ${IMAP_HOST:-ssl://imap.gmail.com}
      ROUNDCUBEMAIL_DEFAULT_PORT: ${IMAP_PORT:-993}
      ROUNDCUBEMAIL_SMTP_SERVER: ${SMTP_HOST:-tls://smtp.gmail.com}
      ROUNDCUBEMAIL_SMTP_PORT: ${SMTP_PORT:-587}
      ROUNDCUBEMAIL_SKIN: elastic
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data: